<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تكتكة | منسف ومشاوي</title>
  <style>
    :root {
      --coal: #0E1B24;
      --stone: #162734;
      --card: rgba(14, 27, 36, 0.82);
      --line: rgba(215, 182, 149, 0.22);
      --cream: #D7B695;
      --muted: #D7B695;
      --flame: #EAA753;
      --ember: #EAA753;
      --gold: #EAA753;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--cream);
      background:
        linear-gradient(rgba(14, 27, 36, 0.78), rgba(14, 27, 36, 0.88)),
        url("taktaka-logo.jpg") center / cover fixed,
        var(--coal);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 4%, rgba(234, 167, 83, 0.24), transparent 36%),
        linear-gradient(135deg, rgba(215, 182, 149, 0.06) 0 1px, transparent 1px 16px);
      mix-blend-mode: screen;
      opacity: 0.55;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px 16px;
      position: relative;
    }

    .page {
      width: min(100%, 470px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(14, 27, 36, 0.9), rgba(14, 27, 36, 0.76));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
    }

    .logo-wrap {
      margin: 0 auto 18px;
      width: min(100%, 330px);
      aspect-ratio: 16 / 11;
      overflow: hidden;
      border: 1px solid rgba(234, 167, 83, 0.42);
      border-radius: 8px;
      background: var(--stone);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .intro {
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 11vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 800;
      color: var(--white);
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 35ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .tag {
      width: fit-content;
      margin: 14px auto 0;
      padding: 7px 13px;
      border: 1px solid rgba(234, 167, 83, 0.42);
      border-radius: 999px;
      color: var(--gold);
      background: rgba(14, 27, 36, 0.42);
      font-size: 13px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 26px;
    }

    .action {
      min-height: 60px;
      display: grid;
      grid-template-columns: 40px 1fr 20px;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--cream);
      background: rgba(215, 182, 149, 0.08);
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(234, 167, 83, 0.58);
      background: rgba(215, 182, 149, 0.13);
      outline: none;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--white);
      background: linear-gradient(135deg, var(--flame), var(--ember));
    }

    .menu .icon {
      color: #21160f;
      background: linear-gradient(135deg, var(--gold), var(--ember));
    }

    .label {
      display: block;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
    }

    .value {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .arrow {
      color: var(--gold);
      font-size: 24px;
      line-height: 1;
    }

    .footer {
      margin: 22px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 380px) {
      .page {
        padding: 18px;
      }

      .action {
        grid-template-columns: 36px 1fr 18px;
      }

      .icon {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <!--
    للتعديل لاحقا:
    1. غير رقم الهاتف في href="tel:..." وفي النص الظاهر.
    2. غير رابط الإنستغرام في href.
    3. غير رابط المنيو في href.
  -->
  <main>
    <section class="page" aria-label="روابط مطعم تكتكة">
      <div class="logo-wrap">
        <img src="taktaka-logo.jpg" alt="شعار مطعم تكتكة" />
      </div>

      <div class="intro">
        <h1>تكتكة</h1>
        <p class="subtitle">منسف ومشاوي بطابع دافئ، وطلبك يوصل للرابط الصحيح بضغطة واحدة.</p>
        <div class="tag">منسف · مشاوي · طلبات</div>
      </div>

      <nav class="actions" aria-label="روابط مهمة">
        <a class="action call" href="tel:+971500000000">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.11 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13 1 .36 1.96.68 2.87a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.2-1.25a2 2 0 0 1 2.11-.45c.91.32 1.87.55 2.87.68A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span>
            <span class="label">اتصال مباشر</span>
            <span class="value">+971 50 000 0000</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>

        <a class="action instagram" href="https://www.instagram.com/taktaka.restaurant" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2" />
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" />
            </svg>
          </span>
          <span>
            <span class="label">صفحة الإنستغرام</span>
            <span class="value">@taktaka.restaurant</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>

        <a class="action menu" href="https://example.com/menu" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
            </svg>
          </span>
          <span>
            <span class="label">فتح المنيو</span>
            <span class="value">الأصناف والأسعار</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>
      </nav>

      <p class="footer">تكتكة · منسف ومشاوي</p>
    </section>
  </main>
</body>
</html>
