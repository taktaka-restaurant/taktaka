<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مطعم تكتكة</title>
  <style>
    :root {
      --ink: #21160f;
      --muted: #755f50;
      --paper: #fff7ec;
      --line: rgba(72, 43, 24, 0.16);
      --tomato: #d94b2b;
      --mint: #2f8b64;
      --saffron: #f1b43a;
      --cream: #fffdf8;
      --shadow: rgba(84, 45, 20, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 20%, rgba(241, 180, 58, 0.24), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(47, 139, 100, 0.18), transparent 24%),
        linear-gradient(135deg, rgba(255, 247, 236, 0.95), rgba(255, 253, 248, 0.9)),
        var(--paper);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.34;
      background-image:
        linear-gradient(30deg, rgba(217, 75, 43, 0.11) 12%, transparent 12.5%, transparent 87%, rgba(217, 75, 43, 0.11) 87.5%, rgba(217, 75, 43, 0.11)),
        linear-gradient(150deg, rgba(217, 75, 43, 0.11) 12%, transparent 12.5%, transparent 87%, rgba(217, 75, 43, 0.11) 87.5%, rgba(217, 75, 43, 0.11)),
        linear-gradient(30deg, rgba(217, 75, 43, 0.11) 12%, transparent 12.5%, transparent 87%, rgba(217, 75, 43, 0.11) 87.5%, rgba(217, 75, 43, 0.11)),
        linear-gradient(150deg, rgba(217, 75, 43, 0.11) 12%, transparent 12.5%, transparent 87%, rgba(217, 75, 43, 0.11) 87.5%, rgba(217, 75, 43, 0.11));
      background-position: 0 0, 0 0, 34px 60px, 34px 60px;
      background-size: 68px 120px;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
      position: relative;
    }

    .page {
      width: min(100%, 470px);
    }

    .hero {
      display: grid;
      gap: 20px;
      align-items: center;
      text-align: center;
    }

    .brand-mark {
      width: 124px;
      height: 124px;
      margin: 0 auto;
      border: 2px solid rgba(241, 180, 58, 0.58);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--cream);
      box-shadow: 0 20px 60px var(--shadow);
    }

    .brand-mark svg {
      width: 88px;
      height: 88px;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 10vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 800;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .badge {
      width: fit-content;
      margin: 15px auto 0;
      padding: 7px 12px;
      border: 1px solid rgba(47, 139, 100, 0.24);
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.84);
      color: var(--mint);
      font-size: 13px;
      font-weight: 700;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .action {
      min-height: 60px;
      display: grid;
      grid-template-columns: 40px 1fr 22px;
      align-items: center;
      gap: 12px;
      padding: 11px 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.9);
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(84, 45, 20, 0.1);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(217, 75, 43, 0.42);
      background: #ffffff;
      outline: none;
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #ffffff;
    }

    .call .icon {
      background: var(--mint);
    }

    .instagram .icon {
      background: var(--tomato);
    }

    .menu .icon {
      background: var(--saffron);
      color: #3b250f;
    }

    .label {
      display: block;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
    }

    .value {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .arrow {
      color: var(--muted);
      font-size: 24px;
      line-height: 1;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 360px) {
      main {
        padding-inline: 12px;
      }

      .action {
        grid-template-columns: 36px 1fr 18px;
        padding-inline: 12px;
      }

      .icon {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <!--
    للتعديل لاحقا:
    1. غيري رقم الهاتف داخل href="tel:..." وداخل النص الظاهر.
    2. غيري رابط الإنستغرام داخل href.
    3. غيري رابط المنيو داخل href.
    4. يمكنك تغيير اسم المطعم والنص القصير من قسم hero.
  -->
  <main>
    <section class="page" aria-label="روابط مطعم تكتكة">
      <div class="hero">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="48" cy="48" r="43" fill="#FFF7EC" stroke="#F1B43A" stroke-width="3" />
            <path d="M24 54c0-16 11-28 24-28s24 12 24 28H24Z" fill="#D94B2B" />
            <path d="M29 54c5-9 12-14 19-14s14 5 19 14H29Z" fill="#F1B43A" />
            <path d="M28 58h40c-2 10-10 17-20 17s-18-7-20-17Z" fill="#2F8B64" />
            <path d="M32 24c4 6 8 6 12 0M46 21c4 8 9 8 14 0" stroke="#2F8B64" stroke-width="4" stroke-linecap="round" />
            <path d="M27 54h42" stroke="#21160F" stroke-width="4" stroke-linecap="round" />
          </svg>
        </div>

        <div>
          <h1>تكتكة</h1>
          <p class="subtitle">أكلات طيبة، طلب سريع، ومنيو جاهز يفتح مباشرة من أي QR.</p>
          <div class="badge">مطعم · وجبات · مشروبات</div>
        </div>
      </div>

      <nav class="actions" aria-label="روابط مهمة">
        <a class="action call" href="tel:+971500000000">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.11 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13 1 .36 1.96.68 2.87a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.2-1.25a2 2 0 0 1 2.11-.45c.91.32 1.87.55 2.87.68A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span>
            <span class="label">اتصال مباشر</span>
            <span class="value">+971 50 000 0000</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>

        <a class="action instagram" href="https://www.instagram.com/taktaka.restaurant" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2" />
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" />
            </svg>
          </span>
          <span>
            <span class="label">صفحة الإنستغرام</span>
            <span class="value">@taktaka.restaurant</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>

        <a class="action menu" href="https://example.com/menu" target="_blank" rel="noopener">
          <span class="icon" aria-hidden="true">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
              <path d="M8 6h13M8 12h13M8 18h13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
            </svg>
          </span>
          <span>
            <span class="label">فتح المنيو</span>
            <span class="value">الأصناف والأسعار</span>
          </span>
          <span class="arrow" aria-hidden="true">‹</span>
        </a>
      </nav>

      <p class="footer">تكتكة · الطعم اللي بيرجعك مرة ثانية</p>
    </section>
  </main>
</body>
</html>
